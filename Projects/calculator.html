<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator App</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
  }
  

  .calculator {
    background: #222;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    width: 300px;
  }

  .display {
    width: 100%;
    height: 60px;
    background: #000;
    color: #0f0;
    text-align: right;
    font-size: 24px;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 15px;
    overflow-x: auto;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  button {
    padding: 15px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    transform: scale(1.1);
  }

  .operator { background: #f39c12; }
  .equal { background: #27ae60; grid-column: span 2; }
  .clear { background: #e74c3c; }
</style>
</head>
<body>

<div class="calculator">
  <div class="display" id="display">0</div>
  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button onclick="append('/')">/</button>
    <button onclick="append('*')">*</button>
    <button onclick="append('-')">-</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('+')">+</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="calculate()">=</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button onclick="append('0')">0</button>
  </div>
</div>

<script>
  let display = document.getElementById('display');

  function append(value) {
    if (display.innerText === '0') display.innerText = '';
    display.innerText += value;
  }

  function clearDisplay() {
    display.innerText = '0';
  }

  function calculate() {
    try {
      display.innerText = eval(display.innerText);
    } catch {
      display.innerText = 'Error';
    }
  }

  // Keyboard Support
  document.addEventListener('keydown', (e) => {
    if ("0123456789+-*/".includes(e.key)) append(e.key);
    else if (e.key === 'Enter') calculate();
    else if (e.key === 'Backspace') display.innerText = display.innerText.slice(0, -1);
    else if (e.key.toLowerCase() === 'c') clearDisplay();
  });
</script>

</body>
</html>
